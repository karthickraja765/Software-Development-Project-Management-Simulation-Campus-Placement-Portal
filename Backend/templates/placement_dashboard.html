<!DOCTYPE html>
<html>
<head>
    <title>Placement Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

{% include 'navbar.html' %}

<div class="container mt-4">

        <h2 class="mb-4">
            Placement Officer Dashboard 
        </h2>
    <div class="row mt-4">

        <div class="col-md-3">
            <div class="card p-3">
                <h5>Total Students</h5>
                <h2>{{ total_students }}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <h5>Total Jobs</h5>
                <h2>{{ total_jobs }}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <h5>Total Applications</h5>
                <h2>{{ total_applications }}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <h5>Total Recruiters</h5>
                <h2>{{ total_recruiters }}</h2>
            </div>
        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Recruiter Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Recruiter Registration</h2>

    <div class="card p-4 mt-4">

        <form>

            <div class="mb-3">
                <label>Company Name</label>
                <input
                    type="text"
                    id="company_name"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>Recruiter Name</label>
                <input
                    type="text"
                    id="recruiter_name"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input
                    type="email"
                    id="email"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input
                    type="password"
                    id="password"
                    class="form-control">
            </div>

            <button
                type="button"
                id="registerRecruiterBtn"
                class="btn btn-primary">
                Register
            </button>

        </form>

    </div>

</div>

<script>

document
    .getElementById('registerRecruiterBtn')
    .addEventListener('click', async function() {

    const recruiterData = {

        company_name:
            document.getElementById('company_name').value,

        recruiter_name:
            document.getElementById('recruiter_name').value,

        email:
            document.getElementById('email').value,

        password:
            document.getElementById('password').value

    };

    try {

        const response = await fetch(
            '/recruiter-register',
            {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(recruiterData)
            }
        );

        const result = await response.json();

        alert(result.message);

    } catch (error) {

        alert('Error registering recruiter');

    }

});

</script>

</body>
</html>

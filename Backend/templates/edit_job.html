<!DOCTYPE html>
<html>
<head>
    <title>Edit Job</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Edit Job</h2>

    <div class="card p-4">

        <form>

            <input
                type="hidden"
                id="job_id"
                value="{{ job['JobID'] }}">

            <div class="mb-3">
                <label>Company Name</label>
                <input
                    type="text"
                    id="company"
                    class="form-control"
                    value="{{ job['Company'] }}">
            </div>

            <div class="mb-3">
                <label>Job Role</label>
                <input
                    type="text"
                    id="role"
                    class="form-control"
                    value="{{ job['Role'] }}">
            </div>

            <div class="mb-3">
                <label>Package</label>
                <input
                    type="number"
                    id="package"
                    class="form-control"
                    value="{{ job['Package'] }}">
            </div>

            <div class="mb-3">
                <label>Eligibility</label>
                <input
                    type="text"
                    id="eligibility"
                    class="form-control"
                    value="{{ job['Eligibility'] }}">
            </div>

            <button
                type="button"
                id="updateJobBtn"
                class="btn btn-primary">
                Update Job
            </button>

        </form>

    </div>

</div>

<script>

document
    .getElementById('updateJobBtn')
    .addEventListener('click', async function() {

    const jobData = {

        job_id:
            document.getElementById('job_id').value,

        company:
            document.getElementById('company').value,

        role:
            document.getElementById('role').value,

        package:
            document.getElementById('package').value,

        eligibility:
            document.getElementById('eligibility').value

    };

    try {

        const response = await fetch(
            '/update-job',
            {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(jobData)
            }
        );

        const result = await response.json();

        alert(result.message);

    } catch (error) {

        alert('Error updating job');

    }

});

</script>

</body>
</html>
